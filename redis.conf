# Redis configuration file

# ── Security ─────────────────────────────────────────────────────────────────
# Bind only to the Docker internal network (do NOT use 0.0.0.0 on a VPS)
bind 0.0.0.0
protected-mode yes

# Require password for all connections
# IMPORTANT: Change this password and mirror it in your .env as REDIS_URL
requirepass GoIBzxg3M0LK0NtDDTYe0Zl86rMjvprD

# Rename dangerous commands (disable CONFIG so attackers can't reconfigure Redis)
rename-command CONFIG ""
rename-command FLUSHALL ""
rename-command FLUSHDB ""
rename-command DEBUG ""

# ── Logging ───────────────────────────────────────────────────────────────────
loglevel notice

# ── Persistence ───────────────────────────────────────────────────────────────
# Disable saving to disk (used as a Celery broker only)
save ""
appendonly no
